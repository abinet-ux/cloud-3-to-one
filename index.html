<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<style>
    body {
        font-family: Arial;
        background: #eef2f3;
        margin: 0;
        padding: 0;
    }

    header {
        background: #34495e;
        color: white;
        text-align: center;
        padding: 15px;
    }

    .container {
        width: 50%;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
    }

    button {
        width: 100%;
        padding: 10px;
        background: green;
        color: white;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background: darkgreen;
    }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
    }

    th {
        background: #34495e;
        color: white;
    }
</style>

</head>
<body>

<header>
    <h2>Software Department Student Registration</h2>
</header>

<div class="container">

    <h3>Register Student</h3>

    <input type="text" id="name" placeholder="Student Name">
    <input type="text" id="id" placeholder="Student ID">

    <select id="year">
        <option value="">Select Year</option>
        <option>1st Year</option>
        <option>2nd Year</option>
        <option>3rd Year</option>
        <option>4th Year</option>
    </select>

    <button onclick="addStudent()">Register</button>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Year</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
    function addStudent() {
        let name = document.getElementById("name").value;
        let id = document.getElementById("id").value;
        let year = document.getElementById("year").value;

        if (name === ""  id === ""  year === "") {
            alert("Please fill all fields!");
            return;
        }

        let table = document.getElementById("tableBody");

        let row = table.insertRow();
        row.insertCell(0).innerHTML = name;
        row.insertCell(1).innerHTML = id;
        row.insertCell(2).innerHTML = year;

        document.getElementById("name").value = "";
        document.getElementById("id").value = "";
        document.getElementById("year").value = "";
    }
</script>

</body>
</html>
